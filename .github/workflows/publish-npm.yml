name: publish-npm

# Publish @bdelanghe/site-mcp to npm using npm TRUSTED PUBLISHING (OIDC).
#
# There is NO NPM_TOKEN. Authentication is short-lived OIDC, exchanged by npm
# itself, so nothing long-lived is ever stored in this repo. For this to work
# you must first register this repo + workflow as a Trusted Publisher for the
# package on npmjs.com (one-time, see README → "Publishing"). Requires npm >= 11.5
# (provided by Node 24's bundled npm), which performs the OIDC token exchange and
# attaches build provenance automatically.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # REQUIRED: lets the job mint the OIDC token npm exchanges for publish auth

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # npm trusted publishing needs npm >= 11.5; ensure it regardless of the
      # version bundled with the chosen Node runtime.
      - name: Ensure npm >= 11.5
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # No NPM_TOKEN / NODE_AUTH_TOKEN: npm performs the OIDC token exchange with
      # the registry's trusted-publisher endpoint and attaches provenance.
      - name: Publish to npm (trusted publishing + provenance)
        run: npm publish --provenance --access public
