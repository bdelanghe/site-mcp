name: publish

# Mirror-publish @bdelanghe/site-mcp to npm, JSR, and the MCP registry on a v* tag.
# All three use KEYLESS OIDC — no tokens are stored in this repo.
#
# NOTE: site-mcp depends on @bounded-systems/static-mcp; that core must be
# published (npm + JSR) before site-mcp can publish. Cut the core's tag first.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # REQUIRED: mints the OIDC token each registry trusts

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Ensure npm >= 11.5 (trusted publishing)
        run: npm install -g npm@latest
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Publish to npm (trusted publishing + provenance)
        run: npm publish --provenance --access public

  jsr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js (for npm-resolved deps)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install npm deps (so Deno can resolve the MCP SDK types)
        run: npm install --no-audit --no-fund
      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: v2.x
      - name: Publish to JSR (keyless OIDC)
        run: deno publish

  mcp-registry:
    runs-on: ubuntu-latest
    needs: [npm]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install mcp-publisher
        run: |
          curl -sSfL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar -xz mcp-publisher
      - name: Login (GitHub OIDC) + publish server.json
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
