name: publish

# ONE tag -> THREE registries, mirrored.
#
# Pushing a `v*` tag (e.g. `v0.1.0`) publishes the SAME version to:
#   1. npm  (@bdelanghe/site-mcp)        - trusted publishing (OIDC) + provenance
#   2. JSR  (@bdelanghe/site-mcp)        - tokenless OIDC publish (mirror of npm)
#   3. MCP Registry (io.github.bdelanghe/site-mcp) - GitHub-OIDC namespace auth
#
# No long-lived secrets: every registry authenticates via the job's short-lived
# GitHub Actions OIDC token (`id-token: write`). The `verify` job hard-fails the
# whole release unless package.json, deno.json, server.json and the git tag all
# carry the SAME version, so npm and JSR can never drift apart.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  # ---------------------------------------------------------------------------
  # Gate: all four version sources must agree before anything is published.
  # ---------------------------------------------------------------------------
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Versions must match (package.json == deno.json == server.json == tag)
        run: |
          set -euo pipefail
          pkg=$(jq -r .version package.json)
          deno=$(jq -r .version deno.json)
          srv=$(jq -r .version server.json)
          # workflow_dispatch has no tag; fall back to package.json in that case.
          tag="${GITHUB_REF_NAME#v}"
          case "$GITHUB_REF" in refs/tags/*) ;; *) tag="$pkg" ;; esac
          echo "package.json=$pkg deno.json=$deno server.json=$srv tag=$tag"
          if [ "$pkg" != "$deno" ] || [ "$pkg" != "$srv" ] || [ "$pkg" != "$tag" ]; then
            echo "::error::version mismatch — keep package.json, deno.json, server.json and the v<version> tag in sync"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # 1. npm — trusted publishing (OIDC) + provenance. Requires npm >= 11.5.
  # ---------------------------------------------------------------------------
  npm:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the OIDC token npm exchanges for publish auth
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm >= 11.5
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # No NPM_TOKEN: npm performs the OIDC exchange with the trusted-publisher
      # endpoint and attaches provenance automatically.
      - name: Publish to npm (trusted publishing + provenance)
        run: npm publish --provenance --access public

  # ---------------------------------------------------------------------------
  # 2. JSR — tokenless OIDC publish. Mirrors the npm release (same version).
  #    JSR publishes the built `dist/` entry (Node-targeted source); the JS
  #    entrypoint needs --allow-slow-types.
  # ---------------------------------------------------------------------------
  jsr:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # tokenless OIDC publish to JSR
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Build (deno.json exports ./dist/index.js)
        run: npm run build

      - name: Publish to JSR (OIDC)
        run: npx --yes jsr publish --allow-slow-types

  # ---------------------------------------------------------------------------
  # 3. MCP Registry — GitHub-OIDC namespace auth (io.github.bdelanghe/*).
  #    Runs AFTER npm: the registry verifies package ownership by reading the
  #    `mcpName` field of the just-published npm package.
  # ---------------------------------------------------------------------------
  mcp-registry:
    needs: [verify, npm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # GitHub OIDC -> io.github.bdelanghe/* namespace
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # No pinnable SHA: the publisher binary must be the LATEST release or the
      # OIDC audience check fails ("invalid audience"). Hence `releases/latest`.
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Validate server.json against the published schema
        run: ./mcp-publisher validate ./server.json

      - name: Authenticate (GitHub OIDC; auto-authes io.github.bdelanghe/*)
        run: ./mcp-publisher login github-oidc

      - name: Publish to the MCP Registry
        run: ./mcp-publisher publish
